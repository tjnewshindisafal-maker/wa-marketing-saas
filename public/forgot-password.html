<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Wadigit</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
body {
  min-height:100vh;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.box {
  background:#fff; border-radius:16px; padding:40px 32px;
  max-width:420px; width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.logo { text-align:center; margin-bottom:24px; }
.logo-icon {
  display:inline-flex; align-items:center; justify-content:center;
  width:64px; height:64px; border-radius:16px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-size:32px; margin-bottom:12px;
}
h1 { font-size:24px; color:#1a1a2e; margin-bottom:8px; text-align:center; }
.sub { color:#666; font-size:14px; text-align:center; margin-bottom:28px; }

.step { display:none; }
.step.active { display:block; }

.progress {
  display:flex; justify-content:space-between; margin-bottom:28px;
  position:relative;
}
.progress::before {
  content:''; position:absolute; top:14px; left:10%; right:10%; height:2px;
  background:#e0e0e0; z-index:0;
}
.progress-step {
  width:30px; height:30px; border-radius:50%;
  background:#e0e0e0; color:#999;
  display:flex; align-items:center; justify-content:center;
  font-weight:600; font-size:13px; z-index:1; position:relative;
  transition:all 0.3s;
}
.progress-step.active { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.progress-step.done { background:#10b981; color:#fff; }

.field { margin-bottom:16px; }
.field label { display:block; font-size:13px; color:#333; margin-bottom:6px; font-weight:500; }
.field input {
  width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:8px;
  font-size:15px; transition:border 0.2s;
}
.field input:focus { outline:none; border-color:#667eea; }
.field .hint { font-size:12px; color:#888; margin-top:4px; }

.btn {
  width:100%; padding:14px; border:none; border-radius:8px;
  background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;
  font-size:15px; font-weight:600; cursor:pointer;
  transition:transform 0.1s, opacity 0.2s;
}
.btn:hover { opacity:0.95; }
.btn:active { transform:scale(0.98); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }

.msg {
  padding:12px; border-radius:8px; margin-bottom:16px;
  font-size:14px; display:none;
}
.msg.error { background:#fee; color:#c00; display:block; }
.msg.success { background:#e6f9ee; color:#0a7; display:block; }
.msg.info { background:#eef4ff; color:#4a5fb8; display:block; }

.links { text-align:center; margin-top:20px; font-size:14px; }
.links a { color:#667eea; text-decoration:none; font-weight:500; }
.links a:hover { text-decoration:underline; }

.otp-input {
  letter-spacing:8px; text-align:center; font-size:20px; font-weight:600;
}

.resend {
  text-align:center; margin-top:12px; font-size:13px; color:#666;
}
.resend a { color:#667eea; text-decoration:none; font-weight:500; cursor:pointer; }
.resend.disabled a { color:#999; cursor:not-allowed; }
</style>
</head>
<body>

<div class="box">
  <div class="logo">
    <div class="logo-icon">🔐</div>
  </div>
  <h1>Reset Password</h1>
  <p class="sub">Enter your registered WhatsApp number</p>

  <div class="progress">
    <div class="progress-step active" id="ps1">1</div>
    <div class="progress-step" id="ps2">2</div>
    <div class="progress-step" id="ps3">3</div>
  </div>

  <div id="msg" class="msg"></div>

  <!-- Step 1: Phone Number -->
  <div class="step active" id="step1">
    <div class="field">
      <label>WhatsApp Number</label>
      <input type="tel" id="phone" placeholder="9876543210" maxlength="15" autocomplete="tel">
      <div class="hint">10-digit Indian mobile number</div>
    </div>
    <button class="btn" onclick="sendOTP()">Send OTP on WhatsApp</button>
  </div>

  <!-- Step 2: OTP -->
  <div class="step" id="step2">
    <div class="field">
      <label>Enter 6-digit OTP</label>
      <input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric">
      <div class="hint">Check your WhatsApp for the OTP</div>
    </div>
    <button class="btn" onclick="verifyOTP()">Verify OTP</button>
    <div class="resend" id="resendBox">
      Didn't get OTP? <a id="resendLink" onclick="resendOTP()">Resend (<span id="timer">60</span>s)</a>
    </div>
  </div>

  <!-- Step 3: New Password -->
  <div class="step" id="step3">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Minimum 6 characters" minlength="6">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirmPass" placeholder="Re-enter password">
    </div>
    <button class="btn" onclick="resetPassword()">Reset Password</button>
  </div>

  <div class="links">
    <a href="/">← Back to Login</a>
  </div>
</div>

<script>
let phoneGlobal = '';
let resetTokenGlobal = '';
let resendTimer = 60;
let timerInterval = null;

function showMsg(text, type='error'){
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
  setTimeout(() => { if(type !== 'success') el.style.display='none'; }, 5000);
}

function goToStep(n){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  for(let i=1; i<=3; i++){
    const ps = document.getElementById('ps'+i);
    ps.classList.remove('active','done');
    if(i < n) ps.classList.add('done');
    else if(i === n) ps.classList.add('active');
  }
}

async function sendOTP(){
  const phone = document.getElementById('phone').value.trim();
  if(!phone || phone.length < 10){ showMsg('Enter valid 10-digit number'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    const r = await fetch('/api/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone })
    });
    const data = await r.json();

    if(data.ok){
      phoneGlobal = phone;
      showMsg(data.msg || 'OTP sent to your WhatsApp', 'success');
      goToStep(2);
      startResendTimer();
    } else {
      showMsg(data.msg || 'Failed to send OTP');
    }
  } catch(e){ showMsg('Network error. Try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Send OTP on WhatsApp'; }
}

function startResendTimer(){
  resendTimer = 60;
  document.getElementById('resendBox').classList.add('disabled');
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    resendTimer--;
    document.getElementById('timer').textContent = resendTimer;
    if(resendTimer <= 0){
      clearInterval(timerInterval);
      document.getElementById('resendBox').classList.remove('disabled');
      document.getElementById('resendBox').innerHTML = 'Didn\'t get OTP? <a onclick="resendOTP()">Resend now</a>';
    }
  }, 1000);
}

async function resendOTP(){
  if(resendTimer > 0) return;
  document.getElementById('phone').value = phoneGlobal;
  await sendOTP();
}

async function verifyOTP(){
  const otp = document.getElementById('otp').value.trim();
  if(!otp || otp.length !== 6){ showMsg('Enter 6-digit OTP'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Verifying...';

  try {
    const r = await fetch('/api/verify-otp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone: phoneGlobal, otp })
    });
    const data = await r.json();

    if(data.ok){
      resetTokenGlobal = data.resetToken;
      showMsg('OTP verified! Set new password.', 'success');
      goToStep(3);
    } else {
      showMsg(data.msg || 'Invalid OTP');
    }
  } catch(e){ showMsg('Network error. Try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Verify OTP'; }
}

async function resetPassword(){
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;

  if(newPass.length < 6){ showMsg('Password must be at least 6 characters'); return; }
  if(newPass !== confirmPass){ showMsg('Passwords do not match'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Resetting...';

  try {
    const r = await fetch('/api/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ resetToken: resetTokenGlobal, newPassword: newPass })
    });
    const data = await r.json();

    if(data.ok){
      showMsg('✅ Password reset! Redirecting to login...', 'success');
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } else {
      showMsg(data.msg || 'Failed to reset password');
    }
  } catch(e){ showMsg('Network error. Try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Reset Password'; }
}

// Auto-focus OTP input digits only
document.getElementById('otp').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '');
});
document.getElementById('phone').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '');
});
</script>

</body>
</html>
